task:

  version: "1.4.0"

  structure:

    task_id: uuid
    correlation_id: uuid
    tenant_id: uuid

    module:
      name: string
      version: string

    action: execute

    execution_requirements:
      mode: pool | dedicated
      
      pool:
        required_agent_type: string
        required_capabilities: array
      
      dedicated:
        target_agent_id: string

    payload:
      params: object # mapeado para os consumes do módulo
      
      limits:
        timeout: number
        cpu: low | medium | high
        rate: safe | aggressive

    execution_policy:
      priority: low | medium | high
      retry: number
      schedule:
        type: immediate | cron
        value: string

    security:
      signed: boolean
      signature: string

    metadata:
      created_by: user_id
      source: system | user | automation
      timestamp: datetime

  rules:
    - toda task deve conter task_id e correlation_id
    - module deve ser válido e suportado pelo agente
    - execution_requirements pode sobrescrever o padrão do module.yaml (override seguro)
    - o agente deve emitir erro se não possuir as capabilities exigidas