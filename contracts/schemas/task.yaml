task:

  version: 1.0

  structure:

    task_id: uuid
    correlation_id: uuid
    tenant_id: uuid

    target:
      type: agent | scan_worker
      id: agent_id

    type: compliance | internal_scan | external_scan | external_domains_compliance

    action: execute

    payload:

      module: string # ex: domain_analyzer_composite, compliance_engine, etc.

      params:
        target_domain: string
        include_partners: boolean
        partners: array
        tools: array
        api_keys_refs: array

      limits:
        timeout: number
        cpu: low | medium | high
        rate: safe | aggressive

    execution:

      priority: low | medium | high

      schedule:
        type: immediate | cron
        value: string  # cron expression se aplicável

      retry: number

    execution_constraints:

      allowed_execution:
        ownership:
          - platform
          - workspace

      requires_role:
        - proxy
        - worker

      network_zone:
        - internal
        - external

    security:

      signed: boolean
      signature: string

    metadata:

      created_by: user_id
      source: system | user | automation
      timestamp: datetime

  rules:
    - toda task deve conter task_id e correlation_id
    - payload.module deve ser válido no module.yaml
    - execution_constraints devem ser respeitados pelo scheduler
    - tasks devem ser idempotentes