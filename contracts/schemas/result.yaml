result:

  version: "1.4.0"

  description: resposta padrão do agent para a plataforma

  structure:

    metadata:
      task_id: uuid
      correlation_id: uuid
      agent_id: string
      tenant_id: uuid
      module:
        name: string
        version: string
      timestamp: datetime

      # proxy relay
      origin_agent_id: string
      via_proxy: string

    status:
      allowed:
        - success  # todos os steps obrigatorios tiveram sucesso
        - failed   # falha em step abort=true
        - partial  # falha em step on_failure=continue ou abort=false

    execution:
      duration_ms: number
      retries: number
      
      steps:
        - id: string
          status: success | failed | skipped
          duration_ms: number
          error: 
            code: number
            message: string

      resources:
        cpu_usage: number
        memory_usage: number
        peak_memory_context: number # pico de uso da KV store

    data:
      raw_data: object
      normalized_data: object
      inventory: array
      findings: array

    error:
      code: number
      message: string
      step_id: string
      details: object

  rules:
    - todo resultado deve seguir esse schema v1.4
    - status=partial deve ser usado se steps opcionais falharam
    - data.inventory deve conter entidades descobertas
    - data.findings deve conter alertas ou vulnerabilidades
    - erros devem incluir step_id para rastreabilidade