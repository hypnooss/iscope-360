result:

  version: 1.1

  description: resposta padrão do agent para a plataforma

  structure:

    metadata:
      task_id: uuid
      correlation_id: uuid
      agent_id: string
      tenant_id: uuid
      module: string
      timestamp: datetime

      # proxy relay
      origin_agent_id: string
      via_proxy: string

    status:
      allowed:
        - success
        - failed
        - partial

    execution:

      duration_ms: number
      retries: number

      resources:

        cpu_usage: number
        memory_usage: number

    data:
      description: resultado normalizado
      type: object

    error:

      structure:
        code: number
        name: string
        category: string
        description: string
        retriable: boolean
        details: object

      source:
        reference: errors.yaml

  rules:

    # gerais
    - todo resultado deve seguir esse schema
    - metadata.correlation_id é obrigatório
    - status deve refletir corretamente a execução
    - data deve ser normalizado
    - erros devem seguir errors.yaml
    - result deve ser compatível com protocol.message_contracts

    # proxy relay
    - quando executado via proxy, origin_agent_id deve representar o agente real
    - via_proxy deve indicar o proxy intermediário
    - platform deve usar origin_agent_id como identidade principal quando presente