errors:

  version: 1.0

  structure:

    fields:
      - code
      - name
      - category
      - description
      - severity
      - retriable

  categories:
    - agent
    - task
    - module
    - execution

  registry:

    agent:

      AGENT_TIMEOUT:
        code: 1001
        category: agent
        description: execution exceeded configured timeout
        severity: error
        retriable: true

      AGENT_UNAVAILABLE:
        code: 1002
        category: agent
        description: agent is offline or unreachable
        severity: error
        retriable: true

    task:

      INVALID_TASK:
        code: 2001
        category: task
        description: task structure is invalid
        severity: error
        retriable: false

      TASK_VALIDATION_FAILED:
        code: 2002
        category: task
        description: task failed validation rules
        severity: error
        retriable: false

    module:

      MODULE_NOT_ALLOWED:
        code: 3001
        category: module
        description: module is not in allowlist
        severity: error
        retriable: false

      MODULE_EXECUTION_FAILED:
        code: 3002
        category: module
        description: module execution returned an error
        severity: error
        retriable: true

      INVALID_PARAMETERS:
        code: 3003
        category: module
        description: input parameters are invalid
        severity: error
        retriable: false

    execution:

      SANDBOX_VIOLATION:
        code: 4001
        category: execution
        description: execution attempted to escape sandbox
        severity: critical
        retriable: false

      RESOURCE_LIMIT_EXCEEDED:
        code: 4002
        category: execution
        description: CPU or memory limit exceeded
        severity: error
        retriable: true

  usage:

    rules:
      - erros devem ser retornados no formato definido em result.yaml
      - code deve ser único no sistema
      - category deve corresponder ao domínio do erro
      - retriable deve ser respeitado pelo orchestration