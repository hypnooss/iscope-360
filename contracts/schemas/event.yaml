event:

  description: eventos trafegados no sistema (Kafka)

  version: 1.2

  # Proxy (eventos de estado - observabilidade)
  # NOTA:
  # proxy.promoted / proxy.demoted representam eventos de estado (Kafka)
  # proxy.elected / proxy.revoked são comandos definidos no protocol.yaml
  types:

    # Task lifecycle
    - task.created
    - task.dispatched
    - task.started
    - task.completed
    - task.failed

    # Agent
    - agent.heartbeat
    - agent.connected
    - agent.disconnected
    - agent.status

    # Alertas
    - alert.generated

    # Proxy
    - proxy.promoted
    - proxy.demoted
    - proxy.unavailable

  structure:

    metadata:
      - event_id
      - type
      - timestamp
      - tenant_id
      - correlation_id

      # proxy relay (condicional)
      - origin_agent_id
      - via_proxy

    payload:
      type: object

  rules:

    # gerais
    - todo evento deve ser versionado
    - eventos devem ser idempotentes
    - type deve existir em event.types

    # proxy relay
    - eventos gerados via proxy devem incluir origin_agent_id
    - eventos encaminhados por proxy devem incluir via_proxy
    - origin_agent_id é obrigatório quando via_proxy está presente
    - via_proxy não deve existir para agentes com conexão direta
    - platform deve usar origin_agent_id como identidade real do agente