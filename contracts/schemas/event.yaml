event:

  description: eventos trafegados no sistema (Kafka)

  version: 1.1

  types:

    # Task lifecycle
    - task.created
    - task.dispatched
    - task.started
    - task.completed
    - task.failed

    # Agent
    - agent.heartbeat
    - agent.connected
    - agent.disconnected
    - agent.status

    # Alertas
    - alert.generated

    # Proxy
    - proxy.promoted
    - proxy.demoted
    - proxy.unavailable

  structure:

    metadata:
      - event_id
      - type
      - timestamp
      - tenant_id
      - correlation_id

      # proxy relay
      - origin_agent_id
      - via_proxy

    payload:
      type: object

  rules:

    # gerais
    - todo evento deve ser versionado
    - eventos devem ser idempotentes
    - type deve existir em event.types

    # proxy relay
    - eventos gerados via proxy devem incluir origin_agent_id
    - eventos encaminhados por proxy devem incluir via_proxy
    - platform deve usar origin_agent_id como identidade real do agente