module:

  identity:
    name: external_domains_compliance
    version: "1.4.0"
    min_agent_version: "1.0.0"

  execution_requirements:
    mode: pool
    required_agent_type: super_agent
    required_capabilities:
      - dns.resolve
      - http.probe

  flow:
    - id: resolve_dns
      name: "Resolução de DNS"
      capability: dns.resolve
      on_failure: abort
      consumes:
        - name: target_domain
          schema_ref: domain_name.schema.json
          required: true
      produces:
        - name: resolved_ips
          schema_ref: ip_list.schema.json
    
    - id: scan_http
      name: "Probe HTTP"
      capability: http.probe
      on_failure: continue
      consumes:
        - name: resolved_ips
          schema_ref: ip_list.schema.json
          required: false
      produces:
        - name: http_metadata
          schema_ref: http_result.schema.json

  error_handling:
    contract:
      reference: errors.yaml
    structure:
      code: number
      message: string
      step_id: string
      details: object

  security:
    rules:
      - sanitizar inputs
      - validar parâmetros antes da execução
      - não aceitar comandos dinâmicos não validados
      - respeitar capabilities declaradas

  observability:
    required:
      - logs de execução
      - tempo de execução
      - status final
    integration:
      - opentelemetry

  constraints:
    rules:
      - módulos não devem conter lógica de negócio
      - módulos não devem tomar decisões
      - módulos devem ser determinísticos