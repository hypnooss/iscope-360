agent:
  version: "1.4.0"
  ownership: platform | workspace

  architecture:
    type: modular
    execution_model: contract_driven_runtime
    update_strategy: atomic_with_rollback

  roles:
    available:
      - worker       # Agente padrão para tarefas genéricas
      - proxy        # Relay de comunicação para redes isoladas
      - super_agent  # Agente de alta performance com engine de contrato v1.4

  communication:
    transport: wss
    port: 443
    mode: outbound_only
    
    streaming:
      enabled: true
      protocol: websocket
      heartbeat: required
      reconnect: automatic

  execution:
    engine: contract_driven
    runtime:
      type: go_runtime
      context_isolation: kv_store_per_task
      quota_management: memory_limit_enabled

    module_registry:
      responsibilities:
        - catalogar capabilities locais
        - validar compatibilidade de versão (min_agent_version)

    sandbox:
      required: true
      strategies:
        - subprocess_controlled
        - container (optional)

  security:
    auth:
      primary: mTLS
      fallback: rotating_token
    task_validation:
      - signature_verification
      - capability_check