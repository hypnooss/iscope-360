orchestration:

  version: "1.4.0"

  strategies:

    execution_modes:
      pool:
        target: super_agents
        logic: any capable agent
      dedicated:
        target: specific_agent
        logic: target_agent_id mandatory

    agent_selection:
      rules:
        - name: ORCH-003
          description: "Validação mandatória de capabilities antes do despacho"
          enforcement: platform_side
          action: reject_task_if_agent_uncapable

    task_distribution:
      broker: rabbitmq
      protocol: amqp
      bridge: wss_gateway

    flow_control:
      model: push (no polling)
      delivery_guarantee: at_least_once
      idempotency: required_at_agent

  lifecycle:
    states:
      - created
      - queued (rabbitmq)
      - pushed (wss_gateway)
      - executing
      - partial
      - completed
      - failed

  aggregation:
    standard: result.yaml
    requirements:
      - correlate_by_correlation_id
      - handle_partial_results