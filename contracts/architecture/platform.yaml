platform:

  version: "1.4.0"

  principles:
    - no_execution: "Plataforma NÃO realiza coleta de dados"
    - contract_first: "Toda execução é dirigida pelo contract v1.4"
    - event_driven: "Comunicação baseada em eventos via RabbitMQ"

  core_components:

    orchestrator:
      responsibilities:
        - criação de tasks
        - validação de capabilities
        - controle de pool vs dedicated
        - gestão de resultados e compliance

    messaging:
      broker: rabbitmq
      queues:
        - tasks.priority_low
        - tasks.priority_high
        - results.ingestion
        - events.agent_status

    wss_bridge:
      name: WSS Gateway
      responsibilities:
        - manter conexões persistentes com agents (WSS 443)
        - bridge RabbitMQ -> WSS (PUSH model)
        - bridge WSS -> RabbitMQ (Result ingestion)
        - gerenciamento de sessão de agente
        - sem polling

    ingestion_layer:
      validation: schema_check_v1.4
      normalization: mandatory
      storage:
        metadata: postgres
        events: opensearch

    security:
      auth:
        - mTLS (agent authentication)
        - token (fallback)
      encryption:
        - TLS 1.3 obrigatório

  multi_tenant:
    strategy: logical_isolation
    correlation_id: mandatory