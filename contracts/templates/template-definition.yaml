template:

  description: definição dinâmica de coleta, análise e avaliação

  versioning:
    strategy: semantic

  structure:

    metadata:
      - template_id
      - name
      - version
      - category

    collection:

      description: como coletar os dados

      fields:
        source_type: api | ssh | command
        endpoint: string
        method: GET | POST | PUT | DELETE
        params: object

      rules:
        - não conter lógica hardcoded no agent
        - deve ser executável via módulo genérico

    parsing:

      description: transformação de dados brutos

      fields:
        extract_fields: list
        transformations: list

      rules:
        - deve produzir output estruturado
        - não depender de parsing fixo no agent

    analysis:

      description: organização e classificação

      fields:
        category: string
        tags: list

    rules:

      description: validações de compliance

      fields:
        - condition
        - expected_value
        - severity

    output:

      description: apresentação final

      fields:
        title: string
        description: string
        recommendation: string