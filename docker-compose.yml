version: '3.8'

services:
  # -------------------------------------------------------------------
  # POSTGRESQL + TIMESCALEDB (Core Data + Metrics)
  # -------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: secops_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: secops_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - secops_net

  # -------------------------------------------------------------------
  # OPENSEARCH (Logs & Events)
  # -------------------------------------------------------------------
  opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: secops_opensearch
    environment:
      - cluster.name=secops-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true # Disable JVM heap memory swapping
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" # Set low memory for local dev
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600" # Performance analyzer
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - secops_net

  # -------------------------------------------------------------------
  # OPENSEARCH DASHBOARDS (Visualização / Kibana-like)
  # -------------------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: secops_os_dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch-node1:9200"]'
    depends_on:
      - opensearch-node1
    restart: unless-stopped
    networks:
      - secops_net

  # -------------------------------------------------------------------
  # RABBITMQ (Message Broker / Fila de Ingestão)
  # -------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: secops_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secretpassword
    ports:
      - "5672:5672"   # Porta do protocolo AMQP (para os Agentes/APIs)
      - "15672:15672" # Painel Web Management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - secops_net

volumes:
  pgdata:
  opensearch-data1:
  rabbitmq_data:

networks:
  secops_net:
    driver: bridge
